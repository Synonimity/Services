<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ subject }}{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f5; font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5; padding: 32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden;">
          <tr>
            <td style="background-color:{{ brand_color }}; padding: 24px 32px;">
              {% if brand_logo_url %}
                <img src="{{ brand_logo_url }}" alt="{{ brand_name }}" height="28">
              {% else %}
                <span style="color:#ffffff; font-size:18px; font-weight:600;">{{ brand_name }}</span>
              {% endif %}
            </td>
          </tr>
          <tr>
            <td style="padding: 32px; color:#27272a; font-size:15px; line-height:1.6;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding: 20px 32px; border-top:1px solid #e4e4e7; color:#a1a1aa; font-size:12px;">
              {{ brand_footer_text }}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
